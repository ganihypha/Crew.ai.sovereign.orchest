tasks:
  # ============================================
  # LAYER 1: DEMAND VALIDATION TASKS
  # ============================================
  
  analyze_demand:
    description: >
      Analyze current demand validation data from the Sovereign Engine.
      Query Supabase for: total products ({total_products}), active orders, 
      completed orders, total revenue, average order value, and repeat 
      customer rate. Compare against validation thresholds defined in 
      knowledge/demand_validation_sop.md.
      
      Produce a Demand Validation Score (0-100) with evidence-based reasoning.
    expected_output: >
      A JSON report containing:
      - demand_score (0-100)
      - verdict (STRONG_DEMAND | GROWING_DEMAND | WEAK_DEMAND | NO_DEMAND)
      - evidence: list of data points supporting the verdict
      - recommendations: 3-5 actionable next steps
      - revenue_summary: total, average, trend
    agent: demand_analyst
    
  track_revenue:
    description: >
      Pull latest revenue data from Supabase orders table.
      Calculate: total revenue, daily revenue trend, top products by revenue, 
      customer spending distribution, and revenue growth rate.
      Flag any anomalies (sudden drops, unusual orders, etc).
    expected_output: >
      Revenue intelligence report with:
      - total_revenue (IDR)
      - daily_trend: array of daily totals
      - top_products: ranked by revenue contribution
      - customer_segments: spending distribution
      - anomalies: any flagged issues
      - growth_rate: percentage
    agent: revenue_tracker

  # ============================================
  # LAYER 2: SYSTEM/SCALE VALIDATION TASKS
  # ============================================
  
  scout_leads:
    description: >
      Execute lead discovery routine:
      1. Query current lead pool from Supabase (target: {target_platform} leads)
      2. Use ScraperAPI to discover new Instagram profiles matching criteria:
         - Fashion/clothing niche
         - 1K-50K followers (sweet spot for resellers)
         - Shows signs of selling offline (no Shopee/Tokopedia links)
      3. Score each lead using the digital gap algorithm
      4. Store qualified leads (score >= {min_lead_score}) in Supabase
    expected_output: >
      Lead discovery report:
      - new_leads_found: count
      - qualified_leads: list with scores
      - top_prospect: highest scoring lead with reasoning
      - digital_gap_distribution: high/medium/low counts
      - recommended_outreach: priority list for Closer Agent
    agent: lead_scout

  validate_system:
    description: >
      Run system health validation checks:
      1. Check all Supabase tables are accessible and responding
      2. Verify WhatsApp (Fonnte) API connectivity and device status
      3. Analyze conversion funnel: leads -> contacted -> converted
      4. Check automation pipelines: scoring, outreach, order processing
      5. Measure response times and error rates
      
      Compare results against thresholds in knowledge/system_validation_sop.md.
    expected_output: >
      System validation report:
      - system_score (0-100)
      - verdict (FULLY_OPERATIONAL | PARTIALLY_OPERATIONAL | DEGRADED | DOWN)
      - pipeline_status: each pipeline's health
      - conversion_funnel: metrics at each stage
      - bottlenecks: identified issues
      - recommendations: fixes and optimizations
    agent: system_validator

  compose_outreach:
    description: >
      For each hot lead (score >= 70), compose a personalized WhatsApp 
      outreach message for Day {outreach_day} of the sequence.
      
      Use lead data (shop_name, platform, followers, digital_gap) to 
      personalize the message. Follow templates in knowledge/outreach_templates.md.
      
      Messages must be:
      - In Bahasa Indonesia (casual, friendly tone)
      - Under 300 characters
      - Include a clear CTA (Call to Action)
      - Feel personal, NOT robotic
    expected_output: >
      Outreach package:
      - messages: array of {lead_id, phone, message, day} objects
      - total_messages: count
      - personalization_notes: how each was customized
      - send_status: ready_to_send / needs_review
    agent: closer_agent

  # ============================================
  # LAYER 3: TRUST/AUTHORITY VALIDATION TASKS
  # ============================================
  
  audit_trust:
    description: >
      Perform trust validation audit across the 3-brand Instagram ecosystem:
      1. @fashionkas.official - Check product posts, customer engagement
      2. @resellerkas.official - Check community activity, UGC
      3. @haidar_faras_m - Check founder content, "Build in Public" posts
      
      Analyze: follower trends, engagement rates, testimonial presence, 
      content consistency, and brand perception.
      
      Compare against criteria in knowledge/trust_validation_sop.md.
    expected_output: >
      Trust validation report:
      - trust_score (0-100)
      - verdict (HIGH_TRUST | BUILDING_TRUST | LOW_TRUST | NO_TRUST)
      - brand_scores: individual score per Instagram account
      - social_proof_count: testimonials, reviews, mentions
      - authority_indicators: media features, collaborations, awards
      - recommendations: trust-building actions
    agent: trust_auditor

  plan_content:
    description: >
      Create a 7-day content calendar for all 3 Instagram accounts.
      
      Layer 1 (@fashionkas.official): 
      - Product showcases, customer reviews, sale announcements
      - Goal: Drive demand signals
      
      Layer 2 (@resellerkas.official):
      - Reseller success stories, tips, community polls
      - Goal: Build scaling proof
      
      Layer 3 (@haidar_faras_m):
      - Behind-the-scenes, revenue milestones, tech stack reveals
      - Goal: Build founder authority
      
      Each post needs: caption, hashtags, optimal posting time, visual direction.
    expected_output: >
      7-day content calendar with:
      - daily_posts: 1-2 per account per day
      - captions: written in Bahasa Indonesia
      - hashtags: 10-15 per post, mix of branded and discovery
      - posting_times: optimized for Indonesian audience
      - content_themes: aligned with validation layer goals
    agent: content_strategist

  # ============================================
  # META TASK: UNIFIED VALIDATION REPORT
  # ============================================
  
  generate_validation_report:
    description: >
      Synthesize all agent outputs into a unified Sovereign Validation Report.
      
      Collect: demand_score, system_score, trust_score from respective agents.
      Calculate: overall_validation_score (weighted: Demand 40%, System 30%, Trust 30%)
      
      Determine overall verdict:
      - Score >= 80: MARKET VALIDATED
      - Score >= 60: PROGRESSING
      - Score >= 40: EARLY STAGE
      - Score < 40: NOT VALIDATED
      
      Include: cross-layer insights, risk factors, and top 5 priority actions.
    expected_output: >
      Sovereign Validation Report:
      - validation_score (0-100)
      - verdict: overall market validation status
      - layer_scores: {demand, system, trust} with individual verdicts
      - cross_layer_insights: patterns across layers
      - risk_factors: top 3 risks identified
      - priority_actions: top 5 recommended next steps
      - data_points_analyzed: total count
      - generated_at: timestamp
      - engine_version: "3.0"
    agent: sovereign_orchestrator
    context:
      - analyze_demand
      - track_revenue
      - scout_leads
      - validate_system
      - audit_trust
